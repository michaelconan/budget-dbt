version: 2

sources:
  - name: revolut
    description: "Transaction data exported from Revolut"
    database: "{{ 'local' if target.name == 'local' else 'etl' }}"
    schema: main
    tables:
      - name: personal
        identifier: raw_revolut__personal
        description: "Personal account statement exported from Revolut"
        columns:
          - name: type
            description: "The kind of the transaction"
            data_type: varchar
            data_tests:
              - not_null
              - accepted_values:
                  arguments:
                    values:
                      - ATM
                      - CARD_PAYMENT
                      - CARD_REFUND
                      - CHARGE
                      - EXCHANGE
                      - FEE
                      - INTEREST
                      - REFUND
                      - REV_PAYMENT
                      - REWARD
                      - TAX
                      - TEMP_BLOCK
                      - TOPUP
                      - TRANSFER
                      - Card Payment
                      - Card Refund
                      - Charge
                      - Exchange
                      - Fee
                      - Interest
                      - Rev Payment
                      - Reward
                      - Tax
                      - Temp Block
                      - Topup
                      - Transfer
          - name: product
            description: "The type of account in which the transaction was made"
            data_type: varchar
            data_tests:
              - not_null
              - accepted_values:
                  arguments:
                    values:
                      - Current
                      - Pocket
                      - Savings
                      - Deposit
          - name: started_date
            description: "The date and time when the transaction was initiated"
            data_type: varchar
            data_tests:
              - not_null
          - name: completed_date
            description: "The date and time when the transaction was completed"
            data_type: varchar
            data_tests:
              - not_null:
                  config:
                    where: "state = 'COMPLETED'"
          - name: description
            description: "The transaction description provided by Revolut"
            data_type: varchar
            data_tests:
              - not_null
          - name: amount
            description: "The amount of the transaction"
            data_type: varchar
            data_tests:
              - not_null
          - name: fee
            description: "Any fee charged for the transaction"
            data_type: varchar
          - name: currency
            description: "The currency code of the transaction"
            data_type: varchar
            data_tests:
              - not_null
          - name: state
            description: "Whether the transaction is posted or reverted"
            data_type: varchar
            data_tests:
              - not_null
              - accepted_values:
                  arguments:
                    values:
                      - COMPLETED
                      - REVERTED
                      - PENDING
          - name: balance
            description: "The account balance after the transaction"
            data_type: varchar
            data_tests:
              - not_null:
                  config:
                    where: "state = 'COMPLETED'"
